<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curax</title>
  <script>
  (function(){
    var m = localStorage.getItem('curax-mode') || 'light';
    var t = localStorage.getItem('curax-theme') || 'portfolio';
    document.documentElement.setAttribute('data-mode', m);
    document.documentElement.setAttribute('data-theme', t);
  })();
  </script>
  <link rel="stylesheet" href="style.css">
  <script src="themes.js"></script>
</head>
<body>
  <header>
    <div class="header-content">
      <div>
        <h1>Curax</h1>
        <p id="subtitle">Index dynamique d'articles Twitter</p>
      </div>
      <div class="theme-controls">
        <select id="theme-select" aria-label="Thème">
          <option value="portfolio">Portfolio</option>
          <option value="mx-brutalist">MX-Brutalist</option>
          <option value="sage-green">Sage Green</option>
          <option value="2077">2077</option>
          <option value="astrovista">AstroVista</option>
          <option value="offworld">Offworld</option>
        </select>
        <button id="mode-toggle" type="button" aria-label="Basculer light/dark">
          <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <nav class="tab-bar" id="tab-bar">
    <button class="tab-button active" data-tab="articles" type="button">
      <span class="tab-icon">📰</span> Articles
    </button>
    <button class="tab-button" data-tab="publications" type="button">
      <span class="tab-icon">🎓</span> Publications
    </button>
  </nav>

  <main id="content">
    <div id="tab-articles" class="tab-content">
      <div class="welcome-message" id="loading">
        <p>Chargement...</p>
      </div>
    </div>
    <div id="tab-publications" class="tab-content" style="display:none"></div>
  </main>

  <footer>
    <p>Généré automatiquement via GitHub Actions</p>
  </footer>

  <script>
    // ── Theme definitions (loaded from themes.js) ──
    var THEMES = CURAX_THEMES;

    // ── Theme switching logic ──
    var currentMode = localStorage.getItem('curax-mode') || 'light';
    var currentTheme = localStorage.getItem('curax-theme') || 'portfolio';

    function applyTheme(themeId, mode) {
      var theme = THEMES[themeId];
      if (!theme) return;
      var styles = theme[mode];
      var root = document.documentElement;

      root.style.cssText = '';
      for (var key in styles) {
        root.style.setProperty('--' + key, styles[key]);
      }

      root.setAttribute('data-mode', mode);
      root.setAttribute('data-theme', themeId);
      localStorage.setItem('curax-theme', themeId);
      localStorage.setItem('curax-mode', mode);
      currentTheme = themeId;
      currentMode = mode;

      updateToggleIcon();
    }

    function updateToggleIcon() {
      var moon = document.getElementById('icon-moon');
      var sun = document.getElementById('icon-sun');
      if (currentMode === 'dark') {
        moon.style.display = 'none';
        sun.style.display = 'block';
      } else {
        moon.style.display = 'block';
        sun.style.display = 'none';
      }
    }

    // Init theme
    var themeSelect = document.getElementById('theme-select');
    var modeToggle = document.getElementById('mode-toggle');

    themeSelect.value = currentTheme;
    applyTheme(currentTheme, currentMode);

    themeSelect.addEventListener('change', function() {
      applyTheme(this.value, currentMode);
    });

    modeToggle.addEventListener('click', function() {
      var newMode = currentMode === 'light' ? 'dark' : 'light';
      applyTheme(currentTheme, newMode);
    });

    // ── Tab switching ──
    var currentTab = localStorage.getItem('curax-tab') || 'articles';

    function switchTab(tabId) {
      currentTab = tabId;
      localStorage.setItem('curax-tab', tabId);

      document.querySelectorAll('.tab-content').forEach(function(el) {
        el.style.display = 'none';
      });
      var target = document.getElementById('tab-' + tabId);
      if (target) target.style.display = '';

      document.querySelectorAll('.tab-button').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-tab') === tabId);
      });

      updateSubtitle(tabId);
    }

    function updateSubtitle(tabId) {
      var sub = document.getElementById('subtitle');
      if (tabId === 'articles') {
        sub.textContent = window._articlesSubtitle || '';
      } else {
        sub.textContent = window._publicationsSubtitle || '';
      }
    }

    document.querySelectorAll('.tab-button').forEach(function(btn) {
      btn.addEventListener('click', function() {
        switchTab(this.getAttribute('data-tab'));
      });
    });

    // ── Shared helpers ──
    function scoreClass(s) {
      if (s <= 2) return 'quality-low';
      if (s <= 4) return 'quality-below';
      if (s <= 6) return 'quality-mid';
      if (s <= 8) return 'quality-good';
      return 'quality-great';
    }

    function buildObservationsBox(text) {
      var obs = document.createElement("section");
      obs.className = "observations";
      var obsTitle = document.createElement("h2");
      obsTitle.textContent = "Analyse du corpus";
      obs.appendChild(obsTitle);
      var obsText = document.createElement("p");
      obsText.textContent = text;
      obs.appendChild(obsText);
      return obs;
    }

    function buildDomainSection(domain, cardBuilder) {
      var section = document.createElement("section");
      section.className = "domain-section";

      var header = document.createElement("div");
      header.className = "domain-header";
      if (domain.icon) {
        var icon = document.createElement("span");
        icon.className = "icon";
        icon.textContent = domain.icon;
        header.appendChild(icon);
      }
      var h2 = document.createElement("h2");
      h2.textContent = domain.name || domain.slug;
      header.appendChild(h2);
      section.appendChild(header);

      if (domain.description) {
        var desc = document.createElement("p");
        desc.className = "domain-description";
        desc.textContent = domain.description;
        section.appendChild(desc);
      }

      var grid = document.createElement("div");
      grid.className = "articles-grid";

      var items = domain.articles || domain.papers || [];
      for (var i = 0; i < items.length; i++) {
        grid.appendChild(cardBuilder(items[i]));
      }

      section.appendChild(grid);
      return section;
    }

    // ── Article card builder ──
    function buildArticleCard(article) {
      var card = document.createElement("article");
      card.className = "article-card";

      var topRow = document.createElement("div");
      topRow.className = "card-top-row";

      var h3 = document.createElement("h3");
      var a = document.createElement("a");
      a.href = article.file;
      a.textContent = article.title || article.file;
      h3.appendChild(a);
      topRow.appendChild(h3);

      if (article.quality_score) {
        var badge = document.createElement("span");
        badge.className = "quality-badge " + scoreClass(article.quality_score);
        badge.textContent = article.quality_score + "/10";
        if (article.quality_note) badge.title = article.quality_note;
        topRow.appendChild(badge);
      }

      card.appendChild(topRow);

      if (article.description) {
        var desc = document.createElement("p");
        desc.className = "description";
        desc.textContent = article.description;
        card.appendChild(desc);
      }

      if (article.tags && article.tags.length > 0) {
        var tagsDiv = document.createElement("div");
        tagsDiv.className = "article-tags";
        for (var i = 0; i < article.tags.length; i++) {
          var chip = document.createElement("span");
          chip.className = "tag-badge";
          chip.textContent = article.tags[i];
          tagsDiv.appendChild(chip);
        }
        card.appendChild(tagsDiv);
      }

      if (article.quality_note) {
        var note = document.createElement("p");
        note.className = "quality-note";
        note.textContent = article.quality_note;
        card.appendChild(note);
      }

      if (article.date) {
        var date = document.createElement("time");
        date.className = "date";
        date.textContent = article.date;
        card.appendChild(date);
      }

      return card;
    }

    // ── Paper card builder ──
    function buildPaperCard(paper) {
      var card = document.createElement("article");
      card.className = "article-card paper-card";

      // Top row: title + badge
      var topRow = document.createElement("div");
      topRow.className = "card-top-row";

      var h3 = document.createElement("h3");
      var a = document.createElement("a");
      a.href = paper.file;
      a.target = "_blank";
      a.textContent = paper.title || paper.file;
      h3.appendChild(a);
      topRow.appendChild(h3);

      if (paper.quality_score) {
        var badge = document.createElement("span");
        badge.className = "quality-badge " + scoreClass(paper.quality_score);
        badge.textContent = paper.quality_score + "/10";
        if (paper.quality_note) badge.title = paper.quality_note;
        topRow.appendChild(badge);
      }

      card.appendChild(topRow);

      // Paper meta: authors, year, journal
      var authors = paper.authors || [];
      var metaParts = [];
      if (authors.length > 0) {
        var authStr = authors.length > 3 ? authors[0] + ' et al.' : authors.join(', ');
        metaParts.push(authStr);
      }
      if (paper.year) metaParts.push(String(paper.year));
      if (paper.journal) metaParts.push(paper.journal);

      if (metaParts.length > 0) {
        var meta = document.createElement("p");
        meta.className = "paper-meta";
        meta.textContent = metaParts.join(' · ');
        card.appendChild(meta);
      }

      // Description
      if (paper.description) {
        var desc = document.createElement("p");
        desc.className = "description";
        desc.textContent = paper.description;
        card.appendChild(desc);
      }

      // Tags
      if (paper.tags && paper.tags.length > 0) {
        var tagsDiv = document.createElement("div");
        tagsDiv.className = "article-tags";
        for (var i = 0; i < paper.tags.length; i++) {
          var chip = document.createElement("span");
          chip.className = "tag-badge";
          chip.textContent = paper.tags[i];
          tagsDiv.appendChild(chip);
        }
        card.appendChild(tagsDiv);
      }

      // Quality note
      if (paper.quality_note) {
        var note = document.createElement("p");
        note.className = "quality-note";
        note.textContent = paper.quality_note;
        card.appendChild(note);
      }

      // DOI
      if (paper.doi) {
        var doiP = document.createElement("p");
        doiP.className = "paper-doi";
        var doiA = document.createElement("a");
        doiA.href = "https://doi.org/" + paper.doi;
        doiA.target = "_blank";
        doiA.textContent = paper.doi;
        doiP.appendChild(doiA);
        card.appendChild(doiP);
      }

      // Date
      if (paper.date) {
        var date = document.createElement("time");
        date.className = "date";
        date.textContent = paper.date;
        card.appendChild(date);
      }

      // Action buttons
      var actions = document.createElement("div");
      actions.className = "paper-actions";

      if (paper.vulgarisation_file) {
        var vBtn = document.createElement("a");
        vBtn.href = paper.vulgarisation_file;
        vBtn.target = "_blank";
        vBtn.className = "action-btn";
        vBtn.innerHTML = '<span class="tab-icon">📚</span> Vulgarisation';
        actions.appendChild(vBtn);
      }

      if (paper.lca_file) {
        var lBtn = document.createElement("a");
        lBtn.href = paper.lca_file;
        lBtn.target = "_blank";
        lBtn.className = "action-btn";
        lBtn.innerHTML = '<span class="tab-icon">📋</span> LCA';
        actions.appendChild(lBtn);
      }

      if (actions.childNodes.length > 0) {
        card.appendChild(actions);
      }

      return card;
    }

    // ── Render articles tab ──
    function renderArticlesTab(manifest, container) {
      var domains = manifest.domains || [];
      var uncategorized = manifest.uncategorized || [];

      // Extract trash
      var trashArticles = [];
      for (var i = 0; i < domains.length; i++) {
        var kept = [];
        var articles = domains[i].articles || [];
        for (var j = 0; j < articles.length; j++) {
          if (articles[j].quality_score && articles[j].quality_score <= 4) {
            trashArticles.push(articles[j]);
          } else {
            kept.push(articles[j]);
          }
        }
        domains[i].articles = kept;
      }

      var totalArticles = domains.reduce(function(sum, d) { return sum + (d.articles || []).length; }, 0) + uncategorized.length + trashArticles.length;
      var totalDomains = domains.filter(function(d) { return (d.articles || []).length > 0; }).length;
      window._articlesSubtitle = totalArticles + ' articles / ' + totalDomains + ' catégories';

      container.innerHTML = "";

      if (totalArticles === 0) {
        container.innerHTML = '<div class="welcome-message"><p>Aucun article pour le moment.</p></div>';
        return;
      }

      if (manifest.observations) {
        container.appendChild(buildObservationsBox(manifest.observations));
      }

      for (var i = 0; i < domains.length; i++) {
        if ((domains[i].articles || []).length === 0) continue;
        container.appendChild(buildDomainSection(domains[i], buildArticleCard));
      }

      if (uncategorized.length > 0) {
        container.appendChild(buildDomainSection({
          name: "Divers", description: "Articles non catégorisés", icon: "📂", articles: uncategorized
        }, buildArticleCard));
      }

      if (trashArticles.length > 0) {
        container.appendChild(buildDomainSection({
          name: "Poubelle", description: "Articles de faible qualité (score ≤ 4/10)", icon: "🗑️", articles: trashArticles
        }, buildArticleCard));
      }
    }

    // ── Render publications tab ──
    function renderPublicationsTab(manifest, container) {
      container.innerHTML = "";

      if (!manifest.papers || !manifest.papers.domains || manifest.papers.domains.length === 0) {
        window._publicationsSubtitle = '0 publications';
        container.innerHTML = '<div class="welcome-message"><p>Aucune publication pour le moment.</p><p>Placez des fichiers PDF dans <code>infiles/</code> et lancez <code>python scripts/import.py infiles/</code></p></div>';
        return;
      }

      var paperDomains = manifest.papers.domains;

      // Extract trash
      var trashPapers = [];
      for (var i = 0; i < paperDomains.length; i++) {
        var kept = [];
        var papers = paperDomains[i].papers || [];
        for (var j = 0; j < papers.length; j++) {
          if (papers[j].quality_score && papers[j].quality_score <= 4) {
            trashPapers.push(papers[j]);
          } else {
            kept.push(papers[j]);
          }
        }
        paperDomains[i].papers = kept;
      }

      var totalPapers = paperDomains.reduce(function(sum, d) { return sum + (d.papers || []).length; }, 0) + trashPapers.length;
      var totalDomains = paperDomains.filter(function(d) { return (d.papers || []).length > 0; }).length;
      window._publicationsSubtitle = totalPapers + ' publications / ' + totalDomains + ' axes';

      if (manifest.papers.observations) {
        container.appendChild(buildObservationsBox(manifest.papers.observations));
      }

      for (var i = 0; i < paperDomains.length; i++) {
        if ((paperDomains[i].papers || []).length === 0) continue;
        container.appendChild(buildDomainSection(paperDomains[i], buildPaperCard));
      }

      if (trashPapers.length > 0) {
        container.appendChild(buildDomainSection({
          name: "Poubelle", description: "Publications de faible qualité (score ≤ 4/10)", icon: "🗑️", papers: trashPapers
        }, buildPaperCard));
      }
    }

    // ── Main app ──
    (async function () {
      try {
        var response = await fetch("manifest.json");
        if (!response.ok) throw new Error("Manifeste introuvable");

        var manifest = await response.json();
        var articlesContainer = document.getElementById("tab-articles");
        var publicationsContainer = document.getElementById("tab-publications");

        renderArticlesTab(manifest, articlesContainer);
        renderPublicationsTab(manifest, publicationsContainer);

        // Apply initial tab
        switchTab(currentTab);
      } catch (e) {
        document.getElementById("tab-articles").innerHTML =
          '<div class="welcome-message">' +
          "<p>Bienvenue sur Curax.</p>" +
          "<p>Ajoutez des articles dans le dossier <code>articles/</code> et poussez sur <code>main</code> pour les voir apparaître ici.</p>" +
          "</div>";
        window._articlesSubtitle = '';
        window._publicationsSubtitle = '';
        switchTab('articles');
      }
    })();
  </script>
</body>
</html>
