<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curax — Index des articles</title>
  <script>
  (function(){
    var m = localStorage.getItem('curax-mode') || 'light';
    var t = localStorage.getItem('curax-theme') || 'portfolio';
    document.documentElement.setAttribute('data-mode', m);
    document.documentElement.setAttribute('data-theme', t);
  })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div>
        <h1>Curax</h1>
        <p>Index dynamique d'articles</p>
      </div>
      <div class="theme-controls">
        <select id="theme-select" aria-label="Thème">
          <option value="portfolio">Portfolio</option>
          <option value="mx-brutalist">MX-Brutalist</option>
          <option value="sage-green">Sage Green</option>
          <option value="2077">2077</option>
          <option value="astrovista">AstroVista</option>
          <option value="offworld">Offworld</option>
        </select>
        <button id="mode-toggle" type="button" aria-label="Basculer light/dark">
          <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main id="content">
    <div class="welcome-message" id="loading">
      <p>Chargement...</p>
    </div>
  </main>

  <footer>
    <p>Généré automatiquement via GitHub Actions</p>
  </footer>

  <script>
    // ── Theme definitions ──
    var THEMES = {
      portfolio: {
        light: {
          background: '#f8f7f2', foreground: '#1a1a1a', card: '#ffffff', 'card-foreground': '#1a1a1a',
          primary: '#c1a875', 'primary-foreground': '#ffffff', 'primary-hover': '#b09560',
          link: '#8b6914', 'link-hover': '#6d5210',
          secondary: '#f0ece0', 'secondary-foreground': '#1a1a1a',
          muted: '#f0ece0', 'muted-foreground': '#6b6352',
          accent: '#f0ece0', 'accent-foreground': '#1a1a1a',
          border: '#e2decb', input: '#e2decb', ring: '#c1a875', radius: '0.75rem'
        },
        dark: {
          background: '#141412', foreground: '#f8f7f2', card: '#1e1e1c', 'card-foreground': '#f8f7f2',
          primary: '#d4bc8b', 'primary-foreground': '#141412', 'primary-hover': '#e0cc9e',
          link: '#e8c878', 'link-hover': '#f0d890',
          secondary: '#2d2b28', 'secondary-foreground': '#f8f7f2',
          muted: '#2d2b28', 'muted-foreground': '#a39e94',
          accent: '#2d2b28', 'accent-foreground': '#f8f7f2',
          border: '#2d2b28', input: '#2d2b28', ring: '#d4bc8b', radius: '0.75rem'
        }
      },
      'mx-brutalist': {
        light: {
          background: 'hsl(45,100%,98%)', foreground: 'hsl(150,60%,5%)', card: 'hsl(45,100%,96%)', 'card-foreground': 'hsl(150,60%,5%)',
          primary: 'hsl(150,100%,28%)', 'primary-foreground': '#ffffff', 'primary-hover': 'hsl(150,100%,22%)',
          secondary: 'hsl(0,100%,48%)', 'secondary-foreground': '#ffffff',
          muted: 'hsl(45,30%,90%)', 'muted-foreground': 'hsl(150,20%,30%)',
          accent: 'hsl(0,100%,48%)', 'accent-foreground': '#ffffff',
          border: '#000000', input: '#000000', ring: 'hsl(150,100%,28%)', radius: '0px'
        },
        dark: {
          background: 'hsl(150,80%,4%)', foreground: 'hsl(45,100%,95%)', card: 'hsl(150,60%,7%)', 'card-foreground': 'hsl(45,100%,95%)',
          primary: 'hsl(150,100%,48%)', 'primary-foreground': 'hsl(150,80%,4%)', 'primary-hover': 'hsl(150,100%,55%)',
          secondary: 'hsl(0,100%,55%)', 'secondary-foreground': '#ffffff',
          muted: 'hsl(150,40%,12%)', 'muted-foreground': 'hsl(45,50%,65%)',
          accent: 'hsl(0,100%,55%)', 'accent-foreground': '#ffffff',
          border: 'hsl(45,100%,95%)', input: 'hsl(45,60%,30%)', ring: 'hsl(150,100%,48%)', radius: '0px'
        }
      },
      'sage-green': {
        light: {
          background: '#fdfdfd', foreground: '#000000', card: '#ffffff', 'card-foreground': '#1a1a1a',
          primary: '#AFBEA5', 'primary-foreground': '#1a1a1a', 'primary-hover': '#97a88d',
          link: '#3d6b35', 'link-hover': '#2d5027',
          secondary: '#f0f2ee', 'secondary-foreground': '#1a1a1a',
          muted: '#f0f2ee', 'muted-foreground': '#5c6356',
          accent: '#495940', 'accent-foreground': '#ffffff',
          border: '#e7e7ee', input: '#e7e7ee', ring: '#AFBEA5', radius: '1.4rem'
        },
        dark: {
          background: '#070503', foreground: '#f9f8f7', card: '#131210', 'card-foreground': '#f9f8f7',
          primary: '#AFBEA5', 'primary-foreground': '#070503', 'primary-hover': '#c0ceb6',
          link: '#c4d4b8', 'link-hover': '#d8e6ce',
          secondary: '#1e1d1a', 'secondary-foreground': '#f9f8f7',
          muted: '#1e1d1a', 'muted-foreground': '#a09d96',
          accent: '#495940', 'accent-foreground': '#ffffff',
          border: '#2f281b', input: '#2f281b', ring: '#AFBEA5', radius: '1.4rem'
        }
      },
      '2077': {
        light: {
          background: '#ffffff', foreground: '#1a1a1a', card: '#f5f5f5', 'card-foreground': '#1a1a1a',
          primary: '#1c1c1c', 'primary-foreground': '#ffffff', 'primary-hover': '#333333',
          secondary: '#f0f0f0', 'secondary-foreground': '#1a1a1a',
          muted: '#f0f0f0', 'muted-foreground': '#666666',
          accent: '#1c1c1c', 'accent-foreground': '#ffffff',
          border: '#e0e0e0', input: '#e0e0e0', ring: '#1c1c1c', radius: '0rem'
        },
        dark: {
          background: '#000000', foreground: '#ffffff', card: '#111111', 'card-foreground': '#ffffff',
          primary: '#d6544b', 'primary-foreground': '#ffffff', 'primary-hover': '#e06b63',
          secondary: '#1a1a1a', 'secondary-foreground': '#ffffff',
          muted: '#1a1a1a', 'muted-foreground': '#888888',
          accent: '#d6544b', 'accent-foreground': '#ffffff',
          border: '#222222', input: '#222222', ring: '#d6544b', radius: '0rem'
        }
      },
      astrovista: {
        light: {
          background: '#e8ebed', foreground: '#333333', card: '#f2f4f6', 'card-foreground': '#333333',
          primary: '#df6035', 'primary-foreground': '#ffffff', 'primary-hover': '#c94f28',
          secondary: '#2f4b79', 'secondary-foreground': '#ffffff',
          muted: '#dde0e4', 'muted-foreground': '#666666',
          accent: '#2f4b79', 'accent-foreground': '#ffffff',
          border: '#cccccc', input: '#cccccc', ring: '#df6035', radius: '0.5rem'
        },
        dark: {
          background: '#1a1a1a', foreground: '#e5e5e5', card: '#242424', 'card-foreground': '#e5e5e5',
          primary: '#df6035', 'primary-foreground': '#ffffff', 'primary-hover': '#f07046',
          secondary: '#284167', 'secondary-foreground': '#e5e5e5',
          muted: '#2a2a2a', 'muted-foreground': '#999999',
          accent: '#284167', 'accent-foreground': '#e5e5e5',
          border: '#353535', input: '#353535', ring: '#df6035', radius: '0.5rem'
        }
      },
      offworld: {
        light: {
          background: '#f5f5f5', foreground: '#1a1a1a', card: '#ffffff', 'card-foreground': '#1a1a1a',
          primary: '#1a1a1a', 'primary-foreground': '#f5f5f5', 'primary-hover': '#333333',
          secondary: '#e8e8e8', 'secondary-foreground': '#1a1a1a',
          muted: '#e8e8e8', 'muted-foreground': '#666666',
          accent: '#e8e8e8', 'accent-foreground': '#1a1a1a',
          border: '#cccccc', input: '#cccccc', ring: '#1a1a1a', radius: '0rem'
        },
        dark: {
          background: '#10100E', foreground: '#FFFFE3', card: '#1a1a17', 'card-foreground': '#FFFFE3',
          primary: '#FFFFE3', 'primary-foreground': '#10100E', 'primary-hover': '#ffffcc',
          secondary: '#252520', 'secondary-foreground': '#FFFFE3',
          muted: '#252520', 'muted-foreground': '#a0a090',
          accent: '#252520', 'accent-foreground': '#FFFFE3',
          border: '#606055', input: '#606055', ring: '#FFFFE3', radius: '0rem'
        }
      }
    };

    // ── Theme switching logic ──
    var currentMode = localStorage.getItem('curax-mode') || 'light';
    var currentTheme = localStorage.getItem('curax-theme') || 'portfolio';

    function applyTheme(themeId, mode) {
      var theme = THEMES[themeId];
      if (!theme) return;
      var styles = theme[mode];
      var root = document.documentElement;

      root.style.cssText = '';
      for (var key in styles) {
        root.style.setProperty('--' + key, styles[key]);
      }

      root.setAttribute('data-mode', mode);
      root.setAttribute('data-theme', themeId);
      localStorage.setItem('curax-theme', themeId);
      localStorage.setItem('curax-mode', mode);
      currentTheme = themeId;
      currentMode = mode;

      updateToggleIcon();
    }

    function updateToggleIcon() {
      var moon = document.getElementById('icon-moon');
      var sun = document.getElementById('icon-sun');
      if (currentMode === 'dark') {
        moon.style.display = 'none';
        sun.style.display = 'block';
      } else {
        moon.style.display = 'block';
        sun.style.display = 'none';
      }
    }

    // Init
    var themeSelect = document.getElementById('theme-select');
    var modeToggle = document.getElementById('mode-toggle');

    themeSelect.value = currentTheme;
    applyTheme(currentTheme, currentMode);

    themeSelect.addEventListener('change', function() {
      applyTheme(this.value, currentMode);
    });

    modeToggle.addEventListener('click', function() {
      var newMode = currentMode === 'light' ? 'dark' : 'light';
      applyTheme(currentTheme, newMode);
    });

    // ── Main app ──
    (async function () {
      const content = document.getElementById("content");

      try {
        const response = await fetch("manifest.json");
        if (!response.ok) throw new Error("Manifeste introuvable");

        const manifest = await response.json();
        const domains = manifest.domains || [];
        const uncategorized = manifest.uncategorized || [];

        if (domains.length === 0 && uncategorized.length === 0) {
          showWelcome();
          return;
        }

        content.innerHTML = "";

        if (manifest.observations) {
          const obs = document.createElement("section");
          obs.className = "observations";
          const obsTitle = document.createElement("h2");
          obsTitle.textContent = "Analyse du corpus";
          obs.appendChild(obsTitle);
          const obsText = document.createElement("p");
          obsText.textContent = manifest.observations;
          obs.appendChild(obsText);
          content.appendChild(obs);
        }

        for (const domain of domains) {
          content.appendChild(buildDomainSection(domain));
        }

        if (uncategorized.length > 0) {
          content.appendChild(
            buildDomainSection({
              name: "Divers",
              description: "Articles non catégorisés",
              icon: "📂",
              articles: uncategorized,
            })
          );
        }
      } catch (e) {
        showWelcome();
      }

      function showWelcome() {
        content.innerHTML =
          '<div class="welcome-message">' +
          "<p>Bienvenue sur Curax.</p>" +
          "<p>Ajoutez des articles dans le dossier <code>articles/</code> et poussez sur <code>main</code> pour les voir apparaître ici.</p>" +
          "</div>";
      }

      function buildDomainSection(domain) {
        const section = document.createElement("section");
        section.className = "domain-section";

        const header = document.createElement("div");
        header.className = "domain-header";
        if (domain.icon) {
          const icon = document.createElement("span");
          icon.className = "icon";
          icon.textContent = domain.icon;
          header.appendChild(icon);
        }
        const h2 = document.createElement("h2");
        h2.textContent = domain.name || domain.slug;
        header.appendChild(h2);
        section.appendChild(header);

        if (domain.description) {
          const desc = document.createElement("p");
          desc.className = "domain-description";
          desc.textContent = domain.description;
          section.appendChild(desc);
        }

        const grid = document.createElement("div");
        grid.className = "articles-grid";

        for (const article of domain.articles || []) {
          grid.appendChild(buildArticleCard(article));
        }

        section.appendChild(grid);
        return section;
      }

      function buildArticleCard(article) {
        const card = document.createElement("article");
        card.className = "article-card";

        const topRow = document.createElement("div");
        topRow.className = "card-top-row";

        const h3 = document.createElement("h3");
        const a = document.createElement("a");
        a.href = article.file;
        a.textContent = article.title || article.file;
        h3.appendChild(a);
        topRow.appendChild(h3);

        if (article.quality_score) {
          const badge = document.createElement("span");
          badge.className = "quality-badge quality-" + article.quality_score;
          badge.textContent = article.quality_score + "/5";
          if (article.quality_note) {
            badge.title = article.quality_note;
          }
          topRow.appendChild(badge);
        }

        card.appendChild(topRow);

        if (article.description) {
          const desc = document.createElement("p");
          desc.className = "description";
          desc.textContent = article.description;
          card.appendChild(desc);
        }

        if (article.quality_note) {
          const note = document.createElement("p");
          note.className = "quality-note";
          note.textContent = article.quality_note;
          card.appendChild(note);
        }

        if (article.date) {
          const date = document.createElement("time");
          date.className = "date";
          date.textContent = article.date;
          card.appendChild(date);
        }

        return card;
      }
    })();
  </script>
</body>
</html>
